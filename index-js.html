<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./CSS file/style-js.css" />
    <link rel="icon" type="image/jpg" href="./images/logo-icon.jpg" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Limited Online Shop</title>
  </head>
  <body>
    <div
      id="header-site-info"
      class="container-fluid d-flex justify-content-between w-100 p-2"
    >
      <p class="p-3">Hi, Account!</p>
      <!-- must chaaaange? ^^^^ -->
      <img
        src="./images/logo-image.jpg"
        alt="Logo"
        id="logo-image"
        class="rounded"
      />
      <div>
        <button class="p-3 mx-4 border-0 rounded" id="cart-btn">
          Cart
          <span id="cart-counter" class="p-2 py-1 rounded-circle">0</span>
        </button>
      </div>
    </div>
    <div class="container m-2">
      <div
        id="cart-container"
        class="d-none row row-cols-md-3 row-cols-sm-2 row-cols-1 p-4 g-2 border-top border-dark rounded-bottom"
      ></div>
    </div>

    <div class="container p-2 h-100">
      <header>
        <div
          class="container d-flex flex-column flex-lg-row justify-content-between border p-3 rounded"
        >
          <div
            class="container d-flex flex-column flex-lg-row justify-content-between align-items-center pb-2"
          >
            <input
              type="text"
              id="search"
              class="p-3 mx-5 border-2 rounded-pill"
              placeholder="Search Product"
            />
            <select
              name="category-select"
              id="category-select"
              class="p-2 w-50 border-2 rounded m-auto mt-2"
              style="height: 55px"
            >
              <option value="0">Category</option>
              <option value="1">Home</option>
              <option value="2">Tech</option>
              <option value="3">Party</option>
            </select>
          </div>
          <div
            class="container d-flex flex-column flex-lg-row justify-content-evenly pt-2"
          >
            <input
              type="submit"
              disabled
              id="remove-filter-btn"
              name="remove-filter-btn"
              class="border-2 rounded px-5 py-0 m-1 h-75"
              value="Remove Filters"
            />
            <input
              type="submit"
              id="filter-btn"
              name="filter-btn"
              class="border-2 rounded px-5 py-0 m-1 h-75"
              value="Filter / Search"
            />
          </div>
        </div>
      </header>
      <main>
        <section class="container mt-3 p-0">
          <article id="products-view">
            <div
              id="product-items"
              class="row row-cols-lg-3 row-cols-sm-2 row-cols-1 g-3"
            ></div>
          </article>
        </section>
        <div id="backtotop-btn" class="bg-primary rounded">
          <a href="#header-site-info">Top</a>
        </div>
      </main>
    </div>
    <footer class="container-fluid w-100 mt-4 p-3" id="footer">
      <div class="d-flex justify-content-evenly mt-3">
        <p>&copy;<span>Limited Online Shop.</span> All Rights Reserved</p>
        <p>Designed By Me</p>
      </div>
    </footer>
    <script src="./JavaScript file/app.js"></script>
  </body>
</html>
